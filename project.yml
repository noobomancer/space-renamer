name: SpaceRenamer
options:
  bundleIdPrefix: com.saint
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  SpaceRenamerCore:
    path: .
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  SpaceRenamer:
    type: application
    platform: macOS
    sources:
      - path: SpaceRenamerApp
    resources:
      - SpaceRenamerApp/Resources/Assets.xcassets
    info:
      path: SpaceRenamerApp/App/Info.plist
      properties:
        CFBundleName: Space Renamer
        CFBundleDisplayName: Space Renamer
        # Pin the version here so xcodegen regenerates Info.plist with the
        # right values every time. Without these explicit pins it resets
        # `CFBundleShortVersionString` to "1.0" / `CFBundleVersion` to "1" on
        # every regenerate, silently dropping any committed version bump.
        CFBundleShortVersionString: "0.1.3"
        CFBundleVersion: "0.1.3"
        LSUIElement: true
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saint.SpaceRenamer
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "6.0"
        # Stable self-signed identity so the Accessibility (TCC) grant survives
        # rebuilds (ad-hoc "-" had no stable Designated Requirement, so TCC never
        # honored the grant and synthesized switches were silently dropped).
        # Recreate the cert with scripts/create-signing-cert.sh if missing.
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "SpaceRenamer Dev"
        CODE_SIGNING_REQUIRED: YES
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
    dependencies:
      - package: SpaceRenamerCore
        product: SpaceRenamerCore
      - package: KeyboardShortcuts
