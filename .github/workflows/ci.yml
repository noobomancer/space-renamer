name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  core-tests:
    name: swift test (Core, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 image has no Xcode 16+ available, so Swift 6 isn't reachable
        # there. The project's deployment target is macOS 13, but the build
        # host needs Xcode 16+ for Swift 6 mode (Package.swift:swift-tools-version).
        os: [macos-14, macos-15]
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: swift test
        run: swift test

  app-build:
    # Verifies the AppKit target still compiles. CI signs ad-hoc — this build
    # is for compile verification only; the resulting .app is NOT runnable for
    # Accessibility (which needs the stable self-signed "SpaceRenamer Dev" cert
    # — see scripts/create-signing-cert.sh).
    name: xcodebuild (app target, ad-hoc signed)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (ad-hoc signed)
        run: |
          xcodebuild \
            -project SpaceRenamer.xcodeproj \
            -scheme SpaceRenamer \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
